name: nf-jdk build
on:

  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile*'
      - 'Makefile'
      - 'VERSION'
      - 'install-jemalloc.sh'
      - 'build-jemalloc.sh'
      - 'build-jemalloc-native.sh'

permissions:
  id-token: write
  contents: write

jobs:
  get-versions:
    name: Get versions from Makefile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1
        with:
          fetch-depth: 1

      - id: versions
        run: |
          echo "versions<<EOF" >> $GITHUB_OUTPUT
          make -s print-versions >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

    outputs:
      versions: ${{ steps.versions.outputs.versions }}

  build-base:
    needs: get-versions
    strategy:
      matrix:
        version: ${{ fromJson(needs.get-versions.outputs.versions) }}

    name: Build base container
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
    - name: Environment
      run: env | sort

    - name: Checkout
      uses: actions/checkout@v1
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Login 
      uses: docker/login-action@v2
      with:
        registry: "cr.seqera.io"
        username: ${{ secrets.SEQERA_CR_USERNAME }}
        password: ${{ secrets.SEQERA_CR_PASSWORD }}

    - name: Set date tag (YYYYMMDD UTC)
      run: echo "DATE_TAG=$(date -u +%Y%m%d%H)" >> $GITHUB_ENV

    - name: Build base image
      run: make build-base version=${{ matrix.version }} DATE_TAG=${{ env.DATE_TAG }}

  build-jemalloc-container:
    needs: get-versions
    strategy:
      matrix:
        version: ${{ fromJson(needs.get-versions.outputs.versions) }}

    name: Build jemalloc container
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
    - name: Environment
      run: env | sort

    - name: Checkout
      uses: actions/checkout@v1
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Login 
      uses: docker/login-action@v2
      with:
        registry: "cr.seqera.io"
        username: ${{ secrets.SEQERA_CR_USERNAME }}
        password: ${{ secrets.SEQERA_CR_PASSWORD }}

    - name: Set date tag (YYYYMMDD UTC)
      run: echo "DATE_TAG=$(date -u +%Y%m%d%H)" >> $GITHUB_ENV

    - name: Build jemalloc image
      run: make build-jemalloc version=${{ matrix.version }} DATE_TAG=${{ env.DATE_TAG }}
